[platformio]
src_dir = .
include_dir = include

[env:esp32c6]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  gin66/FastAccelStepper
  teemuatlut/TMCStepper
build_flags =
  -std=gnu++17
  -DARDUINO_USB_CDC_ON_BOOT=1
src_filter =
  +<src/*.cpp>
  +<platforms/esp32_arduino/src/*.cpp>
  -<tests/*>
